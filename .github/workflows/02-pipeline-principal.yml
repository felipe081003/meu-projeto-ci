name: Pipeline Principal

on:
  push:
  workflow_dispatch:

jobs:
  setup-e-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Mensagem inicial
        run: echo "Analisando qualidade do código..."

  testes-unitarios:
    runs-on: ubuntu-latest
    needs: setup-e-lint
    steps:
      - name: Testes
        run: echo "Rodando testes unitários..."

  scan-de-seguranca:
    runs-on: ubuntu-latest
    needs: setup-e-lint
    steps:
      - name: Segurança
        run: echo "Procurando vulnerabilidades..."

  build-e-deploy:
    runs-on: ubuntu-latest
    needs: 
      - testes-unitarios
      - scan-de-seguranca
    steps:
      - name: Build e Deploy
        run: echo "Gerando artefato e fazendo deploy..."

